<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Finder</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>📚 Book Central </h1>

    

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Search your favorite book..."
        >

        <button id="searchBtn">
            Search
        </button>

    </div>
    <div class="search-info">
        <p>Discover, explore, and save your favorite books from thousands of titles around the world.</p>

    </div>


    <div id="loader">
        Loading Books...
    </div>
    


    <div id="bookContainer"></div>

    <script src="script.js"></script>
    

</body>

</html>
